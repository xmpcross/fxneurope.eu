<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Shared platform powering multiple brands">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#161d36"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f5bff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2c34b8" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="sg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f5bff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#4f5bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" rx="24" fill="url(#sbg)"/>
  <circle cx="600" cy="338" r="260" fill="url(#sg)"/>

  <!-- spokes -->
  <g stroke="#4f5bff" stroke-opacity="0.4" stroke-width="2">
    <line x1="600" y1="338" x2="250" y2="160"/>
    <line x1="600" y1="338" x2="250" y2="520"/>
    <line x1="600" y1="338" x2="950" y2="160"/>
    <line x1="600" y1="338" x2="950" y2="520"/>
    <line x1="600" y1="338" x2="600" y2="110"/>
  </g>
  <!-- flow dots -->
  <g fill="#29e0c4">
    <circle cx="425" cy="249" r="4"/><circle cx="425" cy="429" r="4"/>
    <circle cx="775" cy="249" r="4"/><circle cx="775" cy="429" r="4"/>
    <circle cx="600" cy="224" r="4"/>
  </g>

  <!-- satellite nodes (brands / channels) -->
  <g>
    <g transform="translate(210,120)">
      <rect width="80" height="80" rx="16" fill="#202a4d" stroke="#4f5bff" stroke-opacity="0.5" stroke-width="1.5"/>
      <!-- cart -->
      <path d="M22 28h40l-6 24H30z" fill="none" stroke="#9fb0ff" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="34" cy="60" r="4" fill="#29e0c4"/><circle cx="54" cy="60" r="4" fill="#29e0c4"/>
    </g>
    <g transform="translate(210,480)">
      <rect width="80" height="80" rx="16" fill="#202a4d" stroke="#4f5bff" stroke-opacity="0.5" stroke-width="1.5"/>
      <!-- storefront -->
      <path d="M20 34l6-12h28l6 12" fill="none" stroke="#9fb0ff" stroke-width="3" stroke-linejoin="round"/>
      <rect x="22" y="34" width="36" height="26" fill="none" stroke="#9fb0ff" stroke-width="3"/>
    </g>
    <g transform="translate(910,120)">
      <rect width="80" height="80" rx="16" fill="#202a4d" stroke="#4f5bff" stroke-opacity="0.5" stroke-width="1.5"/>
      <!-- plane -->
      <path d="M18 44l44-16-8 24-12-4-8 12-4-10z" fill="none" stroke="#9fb0ff" stroke-width="3" stroke-linejoin="round"/>
    </g>
    <g transform="translate(910,480)">
      <rect width="80" height="80" rx="16" fill="#202a4d" stroke="#4f5bff" stroke-opacity="0.5" stroke-width="1.5"/>
      <!-- data bars -->
      <rect x="22" y="40" width="8" height="22" fill="#9fb0ff"/>
      <rect x="36" y="30" width="8" height="32" fill="#9fb0ff"/>
      <rect x="50" y="22" width="8" height="40" fill="#29e0c4"/>
    </g>
    <g transform="translate(562,72)">
      <rect width="76" height="76" rx="16" fill="#202a4d" stroke="#4f5bff" stroke-opacity="0.5" stroke-width="1.5"/>
      <!-- box -->
      <path d="M20 28l18-8 18 8v22l-18 8-18-8z" fill="none" stroke="#9fb0ff" stroke-width="3" stroke-linejoin="round"/>
      <line x1="20" y1="28" x2="38" y2="38" stroke="#9fb0ff" stroke-width="3"/>
      <line x1="56" y1="28" x2="38" y2="38" stroke="#9fb0ff" stroke-width="3"/>
    </g>
  </g>

  <!-- central hub -->
  <circle cx="600" cy="338" r="62" fill="url(#hub)" stroke="#7782ff" stroke-width="2"/>
  <g fill="#ffffff">
    <rect x="582" y="312" width="9" height="52" rx="4"/>
    <rect x="582" y="312" width="26" height="9" rx="4"/>
    <rect x="582" y="333" width="19" height="8" rx="4"/>
  </g>
  <rect x="612" y="312" width="11" height="11" rx="3" fill="#29e0c4"/>
</svg>
